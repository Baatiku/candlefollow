version: '3.8'

services:
  bestabot:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

# Usage:
#   1. Copy .env.example to .env and fill in your credentials
#   2. docker-compose up -d
#   3. Open http://localhost:5000
